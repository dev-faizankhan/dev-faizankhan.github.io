<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Faizan Khan | Full-Stack Developer</title>
    <!--
      GitHub Pages SPA fallback (rafgraph/spa-github-pages).
      Any unknown deep link (e.g. /projects/fmi) lands here; this rewrites it to
      /?/projects/fmi and bounces to index.html, which decodes it back to a clean
      URL before React Router mounts. pathSegmentsToKeep = 0 for a user/root page.
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>

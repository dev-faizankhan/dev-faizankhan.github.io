    <!-- GitHub Pages SPA fallback: decode the /?/path redirect from 404.html
         back into a clean URL before the router mounts (rafgraph/spa-github-pages). -->
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>

    <!-- Prevent theme flash: set class before paint -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (!t) {
            t = window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'light'
              : 'dark';
          }
          if (t === 'light') document.documentElement.classList.add('light');
        } catch (e) {}
      })();
    </script>
